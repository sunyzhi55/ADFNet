exp_name: "ADFNet_Exp"
seed: 42

data:
  root: "/data3/wangchangmiao/shenxy/Code/gaze/CalibratedData"
  task_mode: "easy"
  window_size: 256
  stride: 64
  local_mean_size: 16
  landmark_dim: 10
  min_confidence: null

distribution:
  feature_window: 256
  reference_samples: 512
  soft_dtw_reference_samples: 64
  soft_dtw_gamma: 1.0
  eps: 1.0e-6

model:
  input_dim: 3
  dist_feat_dim: 3
  dist_hidden_dim: 32
  dist_out_dim: 64
  mamba_dim: 128
  mamba_layers: 2
  fusion_dim: 192
  landmark_dim: 10
  dropout: 0.2

training:
  epochs: 1000
  batch_size: 128
  optimizer_name: "AdamW"
  lr: 1.0e-3
  weight_decay: 1.0e-4
  momentum: 0.9
  lr_policy: "onecycle" # options: null, lambda, step, plateau, exp, cosine, onecycle
  cos_T0: 20
  cos_Tmult: 2
  cos_eta_min: 1.0e-5
  lr_decay: 0.95
  niter: 50
  niter_decay: 50
  lr_decay_iters: 30
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  threshold: 0.5
  grad_clip_norm: 5.0
  device: "cuda:0"
  output_dir: "./outputs"
  early_stopping:
    enabled: true
    monitor: "val_f1"
    mode: "max"
    patience: 1000
    min_delta: 1.0e-4
  result_selection:
    monitor: "val_f1"
    mode: "max"
    min_delta: 0.0

evaluation:
  metrics_csv: metrics.csv


